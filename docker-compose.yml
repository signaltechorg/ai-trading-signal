services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-tradeclaw}
      POSTGRES_USER: ${DB_USER:-tradeclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tradeclaw}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
    restart: unless-stopped

  migrate:
    image: timescale/timescaledb:latest-pg16
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${DB_USER:-tradeclaw}
      PGPASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      PGDATABASE: ${DB_NAME:-tradeclaw}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/web/migrations:/migrations:ro
    entrypoint: >
      sh -c 'for f in /migrations/*.sql; do
        echo "Running $$f ...";
        psql -v ON_ERROR_STOP=1 -f "$$f";
      done && echo "Migrations complete"'
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${DB_USER:-tradeclaw}:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/${DB_NAME:-tradeclaw}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      APP_URL: ${APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    environment:
      DATABASE_URL: postgres://${DB_USER:-tradeclaw}:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/${DB_NAME:-tradeclaw}
      REDIS_URL: redis://redis:6379
      SCAN_INTERVAL: ${SCAN_INTERVAL:-60}
      SCAN_INSTRUMENTS: ${SCAN_INSTRUMENTS:-all}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-70}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ws-server:
    build:
      context: .
      dockerfile: Dockerfile.ws-server
    ports:
      - "${WS_SERVER_PORT:-4000}:4000"
    environment:
      DATABASE_URL: postgres://${DB_USER:-tradeclaw}:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/${DB_NAME:-tradeclaw}
      REDIS_URL: redis://redis:6379
      WS_SERVER_PORT: "4000"
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Monitoring stack (opt-in): `docker compose --profile monitoring up -d`.
  # Scrapes the app's /api/metrics endpoint. Kept out of the default stack so
  # `docker compose up` stays lean.
  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      # Lets prometheus.yml's host.docker.internal target resolve on Linux.
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  prometheus_data:
  grafana_data:
