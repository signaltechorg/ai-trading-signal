[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "tradeclaw"

  [services.variables]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  PORT = "3000"
  DATABASE_URL = "${{db.DATABASE_URL}}"
  REDIS_URL = "${{redis.REDIS_URL}}"
  AUTH_SECRET = "${{shared.AUTH_SECRET}}"
  APP_URL = "${{shared.APP_URL}}"

[[services]]
name = "db"
image = "timescale/timescaledb:latest-pg16"

  [services.variables]
  POSTGRES_DB = "tradeclaw"
  POSTGRES_USER = "tradeclaw"
  POSTGRES_PASSWORD = "${{shared.DB_PASSWORD}}"

[[services]]
name = "redis"
image = "redis:7-alpine"

[[services]]
name = "ws-server"

  [services.build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile.ws-server"

  [services.deploy]
  healthcheckPath = "/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

  [services.variables]
  NODE_ENV = "production"
  WS_SERVER_PORT = "4000"
  PORT = "4000"
  DATABASE_URL = "${{db.DATABASE_URL}}"
  REDIS_URL = "${{redis.REDIS_URL}}"
