[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run pending DB migrations before starting the server. MUST be wrapped in `sh -c`:
# Railway execs startCommand directly (no shell), so an unwrapped `&&` is passed as a
# literal arg to node and the server never starts. Fail-closed: if migrations exit
# non-zero the server never starts and the prior (healthy) deploy keeps serving.
startCommand = "sh -c 'node scripts/run-migrations.mjs && node apps/web/server.js'"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "tradeclaw"

  [services.variables]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  PORT = "3000"
  DATABASE_URL = "${{db.DATABASE_URL}}"
  REDIS_URL = "${{redis.REDIS_URL}}"
  # Web app signs/verifies session cookies, OAuth state and Telegram link tokens
  # with USER_SESSION_SECRET (lib/user-session.ts fails fast if unset). AUTH_SECRET
  # is only consumed by the ws-server.
  USER_SESSION_SECRET = "${{shared.USER_SESSION_SECRET}}"
  AUTH_SECRET = "${{shared.AUTH_SECRET}}"
  APP_URL = "${{shared.APP_URL}}"

[[services]]
name = "db"
image = "timescale/timescaledb:latest-pg16"

  [services.variables]
  POSTGRES_DB = "tradeclaw"
  POSTGRES_USER = "tradeclaw"
  POSTGRES_PASSWORD = "${{shared.DB_PASSWORD}}"

[[services]]
name = "redis"
image = "redis:7-alpine"

[[services]]
name = "ws-server"

  [services.build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile.ws-server"

  [services.deploy]
  healthcheckPath = "/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

  [services.variables]
  NODE_ENV = "production"
  WS_SERVER_PORT = "4000"
  PORT = "4000"
  DATABASE_URL = "${{db.DATABASE_URL}}"
  REDIS_URL = "${{redis.REDIS_URL}}"
  # ws-server throws at module load in production when AUTH_SECRET is unset
  # (middleware/auth.ts), so the relay crash-loops without this.
  AUTH_SECRET = "${{shared.AUTH_SECRET}}"
