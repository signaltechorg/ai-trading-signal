name: Issue Claim

on:
  issue_comment:
    types: [created]

jobs:
  # ─── Auto-assign when someone claims an issue ───────────────────────────────
  auto-assign-issue:
    name: Auto-assign issue claim
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request
    permissions:
      issues: write
    steps:
      - name: Check if claim comment and assign
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.toLowerCase();
            const claimPhrases = [
              "i'd like to work on",
              "i would like to work on",
              "i can work on",
              "i'll work on",
              "i will work on",
              "i can implement",
              "i'd like to take",
              "i want to work on",
              "assign this to me",
              "can i work on",
              "i'd like to fix",
              "i can fix",
              "i want to fix",
              "i want to take this",
              "i want to implement",
            ];

            const isClaim = claimPhrases.some(phrase => body.includes(phrase));
            if (!isClaim) return;

            const issue = context.payload.issue;
            const commenter = context.payload.comment.user.login;

            // Skip bots
            if (commenter.includes('[bot]') || commenter.includes('-bot')) return;

            // Check if already assigned
            if (issue.assignees && issue.assignees.length > 0) {
              const assignees = issue.assignees.map(a => a.login).join(', ');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Hey @${commenter}! This issue is already assigned to **${assignees}**.\n\nCheck out other [good first issues](https://github.com/${context.repo.owner}/${context.repo.repo}/issues?q=is%3Aopen+label%3A%22good+first+issue%22+no%3Aassignee) that are still available! 🙌`,
              });
              return;
            }

            // Assign the commenter
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [commenter],
              });
            } catch (e) {
              // Assignee might not be a collaborator — still reply
            }

            // Get issue label to customize message
            const labels = issue.labels.map(l => l.name);
            const isGoodFirstIssue = labels.includes('good first issue');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                `✅ Hey @${commenter}! This issue is yours — go for it!`,
                ``,
                isGoodFirstIssue
                  ? `👋 Looks like a **good first issue** — perfect starting point. Don't hesitate to ask questions here if you get stuck.`
                  : ``,
                ``,
                `**Getting started:**`,
                `\`\`\`bash`,
                `git clone https://github.com/${context.repo.owner}/${context.repo.repo}.git`,
                `cd tradeclaw`,
                `npm install`,
                `npm run dev`,
                `\`\`\``,
                ``,
                `**Before submitting your PR:**`,
                `- [ ] \`npm run build\` passes`,
                `- [ ] \`npm run lint\` passes`,
                `- [ ] Tested locally`,
                `- [ ] Branch from \`main\` and keep your branch up to date`,
                ``,
                `📖 Full guide: [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md)`,
                ``,
                `We look forward to your PR! ⚡`,
              ].filter(l => l !== undefined).join('\n'),
            });

# NOTE: The former auto-review-pr job that ran npm run build / npm run lint inside
# a pull_request_target context has been removed. That pattern executes
# contributor-controlled code (build scripts, eslint config) under a write-privileged
# token — a well-known "pwn-request" attack vector.
#
# Build and lint checks already run in ci.yml on the pull_request event (read-only
# token, safe). If a bot comment summarising those results is desired, implement it
# using the workflow_run trigger pattern:
#   on:
#     workflow_run:
#       workflows: ["CI"]
#       types: [completed]
# That fires after ci.yml finishes in the base-repo context and can safely post a
# PR comment without ever touching untrusted code.
