name: Signal Alerts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Prevent overlapping runs. If a run takes >5 minutes the next scheduled
# trigger would start while signals are still being marked as posted — causing
# duplicate Telegram alerts. cancel-in-progress: false lets the active run
# finish; the queued run is skipped rather than cancelled.
concurrency:
  group: signal-alerts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-new-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Detect new signals and post immediate Telegram alerts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TRADECLAW_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TRADECLAW_TELEGRAM_CHANNEL_ID }}
          API_BASE_URL: https://tradeclaw.win
        run: |
          set -euo pipefail

          curl -fsSL -X POST "${API_BASE_URL}/api/cron/signals" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -o /tmp/tradeclaw-cron-signals.json

          npx --yes tsx scripts/cron/signal-alerts.ts
