name: Docker Publish

# Publish `ghcr.io/naimkatiman/tradeclaw:latest` on every push to main and
# `:edge` for short-lived testing. Tagged releases (v*) are handled by
# release.yml — this workflow gives self-hosters a fresh-from-main image
# for the one-liner:
#
#   docker run -p 3000:3000 ghcr.io/naimkatiman/tradeclaw:latest

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'apps/**'
      - 'packages/**'
      - 'scripts/**'
      - 'docker-entrypoint.sh'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build & Push :latest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/tradeclaw:latest
            ghcr.io/${{ github.repository_owner }}/tradeclaw:edge
            ghcr.io/${{ github.repository_owner }}/tradeclaw:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=TradeClaw — self-hosted AI trading signals
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.revision=${{ github.sha }}
