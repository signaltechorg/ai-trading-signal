name: Telegram Broadcast

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  broadcast-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch live signals and post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TRADECLAW_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TRADECLAW_TELEGRAM_CHANNEL_ID }}
          API_BASE_URL: https://tradeclaw.win
        run: |
          set -euo pipefail

          curl -fsSL \
            -A "AITradingSignalBot/1.0 (+https://github.com/signaltechorg/ai-trading-signal)" \
            "${API_BASE_URL}/api/digest/daily" \
            -o /tmp/tradeclaw-digest.json

          npx --yes tsx scripts/cron/telegram-broadcast.ts
