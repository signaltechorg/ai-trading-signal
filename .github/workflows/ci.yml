name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # @tradeclaw/signals resolves through its dist build; type-check needs it present.
      - run: npm run build:signals
      - run: npm run lint
      - run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          NEXT_TELEMETRY_DISABLED: 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tradeclaw/app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  strategy-backtests:
    # Run the deterministic backtest suite whenever anything the backtest
    # engine depends on changes. The cache key is content-addressed, so
    # unrelated PRs (UI-only, docs, workflows) get an instant cache-hit and
    # never execute the suite. When the inputs change we run it fresh and
    # publish the snapshot + log as an artifact so reviewers can diff.
    name: Strategy Backtests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Compute backtest-deps hash
        id: hash
        run: |
          HASH=$(find \
              packages/strategies/src \
              packages/signals/src \
              packages/core/src \
              packages/strategies/package.json \
              packages/signals/package.json \
              packages/core/package.json \
              -type f \
            | sort \
            | xargs sha256sum \
            | sha256sum \
            | cut -c1-16)
          echo "key=$HASH" >> "$GITHUB_OUTPUT"
      - name: Restore cached backtest result
        id: cache
        uses: actions/cache@v4
        with:
          path: .cache/backtest-result
          key: backtest-${{ steps.hash.outputs.key }}
      - name: Install
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Run strategy backtests
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/backtest-result
          npm test --workspace=@tradeclaw/strategies 2>&1 | tee .cache/backtest-result/output.log
          cp -r packages/strategies/src/__tests__/__snapshots__ .cache/backtest-result/snapshots || true
          echo "$GITHUB_SHA" > .cache/backtest-result/sha
      - name: Skip (cache hit)
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          echo "Backtest inputs unchanged (hash=${{ steps.hash.outputs.key }}); cached result reused."
          test -f .cache/backtest-result/output.log && tail -20 .cache/backtest-result/output.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-result-${{ steps.hash.outputs.key }}
          path: .cache/backtest-result
          retention-days: 14
          if-no-files-found: ignore

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    # Non-blocking until the suite stabilizes. Flip to false once the suite is
    # consistently green against the CI Postgres sidecar.
    continue-on-error: true
    timeout-minutes: 30
    services:
      # Ephemeral Postgres per CI run — avoids any risk of writing test signals
      # to the production Railway DB. Migrations are applied below.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tradeclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      CI: 'true'
      NEXT_TELEMETRY_DISABLED: '1'
      # Disable the rolling-window rate limiter for the serial suite only — a
      # single next-start instance accumulates per-key hits across tests and
      # returns 429 where tests expect 200/401/403. Set ONLY here; never in prod.
      E2E_DISABLE_RATE_LIMIT: '1'
      # Sidecar Postgres URL — visible to the migration step, the dev server
      # spawned by Playwright's webServer, and the tests themselves.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tradeclaw_test
      USER_SESSION_SECRET: ${{ secrets.E2E_USER_SESSION_SECRET }}
      CRON_SECRET: ${{ secrets.E2E_CRON_SECRET }}
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}
      - name: Build signals (dev server resolves @tradeclaw/signals from dist)
        run: npm run build:signals
        working-directory: ${{ github.workspace }}
      - name: Apply migrations to sidecar Postgres
        # Bypass the Railway-tuned migration runner (which forces SSL) by
        # piping each .sql file through psql directly. CI starts from an empty
        # DB every run, so we don't need the runner's _migrations tracking.
        run: |
          set -euo pipefail
          for f in migrations/[0-9]*.sql; do
            echo "→ $f"
            PGPASSWORD=postgres psql -h localhost -U postgres -d tradeclaw_test -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Install Playwright browsers
        # The 'mobile' project uses devices['iPhone 14'] (WebKit engine), so
        # webkit must be installed alongside chromium or every mobile test
        # errors at browserType.launch.
        run: npx playwright install --with-deps chromium webkit
      - name: Build app
        # Playwright's webServer runs `next start` in CI (precompiled routes),
        # so the app must be built first. Uses the root build (signals +
        # trading-agents + apps/web) for parity with the Build job. Migrations
        # were already applied above.
        run: npm run build
        working-directory: ${{ github.workspace }}
        env:
          NEXT_TELEMETRY_DISABLED: '1'
      - name: Run E2E suite
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 3
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit
          path: apps/web/test-results/results.xml
          retention-days: 3
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results
          retention-days: 3
          if-no-files-found: ignore
